name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # for creating GitHub Releases
  id-token: write   # for PyPI trusted publishing (OIDC)

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard
        run: cd dashboard && npm ci && npm run build
        # Output lands in traceai/dashboard/dist/ which Hatchling picks up automatically.

      - name: Install build deps
        run: uv pip install --system hatchling

      - name: Build package
        run: uv build

      - name: Verify dist contents
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publishing (OIDC) — no API token needed.
        # Configure at: https://pypi.org/manage/account/publishing/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
