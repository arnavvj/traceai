<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="280" height="280" rx="52" fill="url(#bg)"/>

  <!-- Subtle grid lines (timeline columns) -->
  <line x1="95"  y1="44" x2="95"  y2="185" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="155" y1="44" x2="155" y2="185" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="215" y1="44" x2="215" y2="185" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- ── Trace waterfall ── -->

  <!-- Row 0: thin timeline ruler -->
  <line x1="35" y1="52" x2="245" y2="52" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="35"  cy="52" r="2.5" fill="#6366f1" opacity="0.4"/>
  <circle cx="245" cy="52" r="2.5" fill="#6366f1" opacity="0.4"/>

  <!-- Row 1: Root / agent span (full width) -->
  <rect x="35" y="60" width="210" height="18" rx="9" fill="url(#accent)" opacity="0.95" filter="url(#glow)"/>

  <!-- Row 2: LLM call (large) + Tool call -->
  <rect x="35"  y="90"  width="118" height="15" rx="7" fill="#818cf8" opacity="0.85"/>
  <rect x="163" y="90"  width="82"  height="15" rx="7" fill="url(#green)" opacity="0.75"/>

  <!-- Row 3: nested sub-spans -->
  <rect x="45"  y="117" width="55" height="13" rx="6" fill="#a78bfa" opacity="0.80"/>
  <rect x="108" y="117" width="38" height="13" rx="6" fill="#a78bfa" opacity="0.65"/>
  <rect x="168" y="117" width="52" height="13" rx="6" fill="#6ee7b7" opacity="0.65"/>

  <!-- Row 4: deepest spans -->
  <rect x="52"  y="142" width="32" height="11" rx="5" fill="#c4b5fd" opacity="0.60"/>
  <rect x="93"  y="142" width="22" height="11" rx="5" fill="#c4b5fd" opacity="0.50"/>
  <rect x="172" y="142" width="30" height="11" rx="5" fill="#a7f3d0" opacity="0.55"/>

  <!-- Connector lines (parent → child) -->
  <line x1="53"  y1="78"  x2="53"  y2="90"  stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="163" y1="78"  x2="163" y2="90"  stroke="#34d399" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="60"  y1="105" x2="60"  y2="117" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.30"/>
  <line x1="178" y1="105" x2="178" y2="117" stroke="#6ee7b7" stroke-width="1.5" stroke-opacity="0.30"/>

  <!-- Left anchor line (the vertical bar of the "T") -->
  <rect x="35" y="60" width="3" height="96" rx="1.5" fill="#6366f1" opacity="0.30"/>

  <!-- Bottom scan line -->
  <rect x="35" y="164" width="210" height="2" rx="1" fill="#6366f1" opacity="0.18"/>

  <!-- ── Word mark ── -->
  <!-- "Trace" in light weight -->
  <text x="98" y="220"
    font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
    font-size="34"
    font-weight="300"
    fill="#e0e7ff"
    fill-opacity="0.92"
    text-anchor="middle"
    letter-spacing="1">Trace</text>

  <!-- "AI" bold with accent colour -->
  <text x="183" y="220"
    font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
    font-size="34"
    font-weight="800"
    fill="url(#accent)"
    text-anchor="middle"
    letter-spacing="0">AI</text>

  <!-- Tagline -->
  <text x="140" y="248"
    font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
    font-size="10"
    font-weight="400"
    fill="#94a3b8"
    fill-opacity="0.75"
    text-anchor="middle"
    letter-spacing="2.5">CHROME DEVTOOLS FOR AI</text>
</svg>
